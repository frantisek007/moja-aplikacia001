name: Create Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Načítať verziu
        id: version
        run: echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Vytvoriť Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Verzia ${{ steps.version.outputs.version }}
          body: Automaticky vytvorená verzia ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false